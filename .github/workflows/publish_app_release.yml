name: app-build-action

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 指定具体版本，不指定 architecture，让 action 自动适配
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # 使用明确支持 ARM64 的版本
          cache: true

      - name: Get version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "content={\"version\":\"$TAG_NAME\",\"version_desc\":\"Release $TAG_NAME\",\"prerelease\":false}" >> $GITHUB_OUTPUT

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 构建全部 ABI (armeabi-v7a, arm64-v8a, x86_64)
      - name: Build APK (all ABIs)
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - run: echo "🍏 This job's status is ${{ job.status }}."