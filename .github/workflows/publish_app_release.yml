name: app-build-action

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # 改用明确支持 ARM64 的版本
          cache: true
          # 不指定 architecture，自动适配

      - name: Get version info
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "content={\"version\":\"$TAG_NAME\",\"version_desc\":\"Release $TAG_NAME\",\"prerelease\":false}" >> $GITHUB_OUTPUT

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build APK (arm64-v8a only)
        run: |
          cd simple_live_app
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-release.apk

      - run: echo "🍏 This job's status is ${{ job.status }}."